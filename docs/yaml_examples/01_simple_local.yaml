# Simple IOR Benchmark - Local Execution
#
# This is a minimal example demonstrating:
# - Local execution (no SLURM)
# - 2 swept variables (processes, block_size)
# - 2 repetitions per test
# - CSV output
# - Caching with cache_exclude_vars

benchmark:
  name: "IOR Simple Local Test"
  description: "Basic I/O performance test with local execution"
  workdir: "/tmp/ior_simple"
  sqlite_db: "/tmp/ior_simple_cache.db"  # Enable caching
  executor: "local"
  repetitions: 2
  random_seed: 42
  cache_exclude_vars: ["summary_file"]  # Exclude path-based derived vars

vars:
  # Swept variables
  processes:
    type: int
    sweep:
      mode: list
      values: [4, 8, 16, 32]

  block_size_mb:
    type: int
    sweep:
      mode: list
      values: [16, 32]

  # Derived variables
  summary_file:
    type: str
    expr: "{{ execution_dir }}/summary_{{ execution_id }}_r{{ repetition }}.json"

command:
  template: >
    mpirun --oversubscribe -np {{ processes }}
    ior -w -b {{ block_size_mb }}mb -t 1mb
    -O summaryFile={{ summary_file }}
    -O summaryFormat=JSON
    -o {{ execution_dir }}/test.ior

  metadata:
    operation: "write"
    io_engine: "MPI-IO"

scripts:
  - name: "ior"
    submit: "bash"

    script_template: |
      #!/bin/bash
      set -euo pipefail

      echo "========================================="
      echo "Execution ID: {{ execution_id }}"
      echo "Repetition:   {{ repetition }}/{{ repetitions }}"
      echo "Processes:    {{ processes }}"
      echo "Block Size:   {{ block_size_mb }}MB"
      echo "========================================="

      # Run IOR benchmark
      {{ command.template }}

      echo "Completed at $(date)"

    post:
      script: |
        #!/bin/bash
        echo "Summary file: {{ summary_file }}"

    parser:
      file: "{{ summary_file }}"
      metrics:
        - name: bwMiB
        - name: iops
      parser_script: |
          import json

          def parse(file_path: str):
              """
              IOR JSON parser.

              Returns a dict with ALL fields from the first write Results entry:
                - bwMiB
                - blockKiB
                - xferKiB
                - iops
                - latency
                - openTime
                - wrRdTime
                - closeTime
                - totalTime
                - access
              """
              with open(file_path, "r") as f:
                  data = json.load(f)

              # Prefer tests[].Results (per-execution detailed metrics)
              tests = data.get("tests", [])
              if not tests:
                  raise ValueError("No tests found in IOR JSON")

              results = tests[0].get("Results", [])
              if not results:
                  raise ValueError("No Results found in IOR JSON")

              # Pick the write result (or the first one if only one exists)
              write_res = next(
                  (r for r in results if str(r.get("access", "")).lower() == "write"),
                  results[0],
              )

              # Return everything as-is
              return write_res

output:
  sink:
    type: csv
    path: "{{ workdir }}/results.csv"
    mode: append
    exclude:
      - "benchmark.description"
