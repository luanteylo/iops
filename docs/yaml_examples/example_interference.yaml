benchmark:
  name: "Interference Tests"
  description: "A test to measure interference effects when multiple IOR instances write concurrently to different OSTs."
  workdir: "/home/luan/workdir/"
  

vars:
  # Swept variables (cartesian product over all sweeps)
  nodes:
    type: int
    sweep:
      mode: list       # range | list
      values: [1]
      

  processes_per_node:
    type: int
    sweep:
      mode: list
      values: [16]

  block_size_mb:
    type: int
    sweep:
      mode: list
      values: [16]

  ost_path:
    type: str
    sweep:
      mode: list
      values: ["/beegfs/lgouveia/ior_1", "/beegfs/lgouveia/ior_2"]

  # Derived variables (computed from other vars / benchmark fields)
  summary_file:
    type: str
    expr: "{{ workdir }}/summary_{{ execution_id }}.json"

  total_data_size:
    type: float
    expr: "nodes * processes_per_node * block_size_mb"
    # ^ you can evaluate this with Jinja2 or your own expression engine

command:
  # Generic command template – not tied to IOR in the schema, only in this example
  template: >
    
    mpirun --mca btl ^uct --mca fs ^lustre --mca osc ^ucx --mca pml ^ucx --mca btl_openib_allow_ib 1
    ior -w -b {{ block_size_mb }}mb -t 1m
    -O summaryFile={{ summary_file }} -O summaryFormat=JSON
    -o {{ ost_path }}/output.ior  &
    
    ior_a = $!

    mpirun --mca btl ^uct --mca fs ^lustre --mca osc ^ucx --mca pml ^ucx --mca btl_openib_allow_ib 1
    ior -w -F -b {{ block_size_mb }}mb -t 1m
    -O summaryFile={{ summary_file }} -O summaryFormat=JSON
    -o {{ ost_path }}/output.ior  &
    
    ior_b = $!
    
    wait $ior_a
    
    wait $ior_b

    


  # Optional metadata you keep in the DB / CSV for free
  metadata:
    operation: "write"
    io_engine: "MPI-IO"
    access_pattern: "contiguous"
    transfer_size: "{{ block_size_mb }}"
    total_data_size: "{{ total_data_size }}"

  # Default environment for *this* command
  env:
    ENV_EXAMPLE: "example_value"

scripts:
  - name: "slurm_mpi"
    mode: "slurm"        # slurm | local | k8s | whatever you support
    submit: "sbatch"     # sbatch | srun | bash …

    

    # Full script template (this is effectively your “Slurm template file”)
    script_template: |
      #!/bin/bash
      #SBATCH --job-name=ior_benchmark
      #SBATCH --output=ior_benchmark_%j.out
      #SBATCH --error=ior_benchmark_%j.err
      #SBATCH --nodes={{ nodes }}
      #SBATCH --ntasks-per-node={{ processes_per_node }}
      #SBATCH --time=01:00:00

      module load mpi
      module load ior

      {{ command.template }}
    
    post:
      # Optional post-processing script (e.g., to move files, clean up, etc.) Always executed locally after job completion
      script: |
        #!/bin/bash
        echo "Job completed. Summary file located at {{ summary_file }}"
        
    
    
    # How to get metrics out of a run
    parser:
      type: "json"          # json | text | custom
      file: "{{ summary_file }}"
      metrics:
        - name: "write_bandwidth"
          path: "results[0].bw_MiB"   # JSON path (your tool defines the syntax)

      # Optional: if you want full freedom, you can embed a parser script
      parser_script: |
        import json
        import sys

        summary_file = sys.argv[1]

        with open(summary_file, "r") as f:
          data = json.load(f)

        # Example: adapt to your IOR JSON schema
        write_bw = data["results"][0]["bw_MiB"]
        print(write_bw)  # your tool reads stdout

output:
  csv:
    path: "{{ workdir }}/results.csv"
    include:
      - "benchmark.name"
      - "nodes"
      - "processes_per_node"
      - "block_size"
      - "ost_path"
      - "total_data_size"
      - "write_bandwidth"
