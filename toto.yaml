# =============================================================================
# IOPS Benchmark Configuration Template (SLURM-Ready)
# =============================================================================
#
# This is a comprehensive template showing all available IOPS configuration options.
# Copy this file and customize it for your benchmark needs.
#
# Quick Start:
#   1. Edit the configuration to match your needs
#   2. Validate: iops my_benchmark.yaml --check_setup
#   3. Dry run: iops my_benchmark.yaml --dry-run
#   4. Execute: iops my_benchmark.yaml
#
# Documentation: https://lgouveia.gitlabpages.inria.fr/iops/reference/yaml-schema/ 
# =============================================================================


# =============================================================================
# BENCHMARK CONFIGURATION
# =============================================================================
benchmark:
  # Required: Name of the benchmark (used in logs and job names)
  name: "toto+base+all"

  # Optional: Description of what this benchmark measures
  description: "TOTO Study:  All tests with toto + baseline (without toto)"

  # Required: Working directory where all run outputs will be stored
  # Structure: <workdir>/run_NNN/runs/ and <workdir>/run_NNN/logs/
  workdir: "/home/lgouveia/workdir"

  # Optional: SQLite database for caching execution results
  # When --use_cache is specified, results are reused if parameters match
  # Set this to enable caching across multiple runs
  cache_file: "/home/lgouveia/workdir/cache.db"

  # Optional: Number of repetitions for each test case (default: 1)
  repetitions: 6

  search_method: "exhaustive"
  
  executor: "slurm"
  slurm_options:
    poll_interval: 1 
  random_seed: 42

  cache_exclude_vars: ["summary_file"]
  cores_expr: "{{ nodes * 36 }}"
  #report_vars: ["nodes", "processes_per_node", "volume_size_gb"]
  collect_system_info: true
  track_executions: true
  trace_resources: true    # Enable tracing (default: false)
  trace_interval: 0.05      # Sample every 1 second (default)

 
vars:
  with_toto:
    type: bool
    sweep:
      mode: list
      values: [0, 1]

  nodes:
    type: int
    sweep:
      mode: list
      values: [2, 4, 8, 16]
  
  total_procs:
    type: int
    sweep:
      mode: list
      values: [16, 32, 64, 256]

  requests_mb:
    type: int
    sweep:
      mode: list
      values: [1, 8, 32]

  volume_size_gb:
    type: int
    sweep:
      mode: list
      values: [32]

  analysis_period:
    type: int
    sweep:
      mode: list
      values: [250, 500, 1000, 2000]
    when: "with_toto"
    default: 0

  spatiality:
    type: str
    sweep:
      mode: list
      values: ['cont', 'random']

  filestrategy:
    type: str
    sweep:
      mode: list
      values: ['shared-file', 'file-per-proc']

  procs_per_node:
    type: int
    expr: "{{ total_procs // nodes }}"

  block_size_mb:
    type: int
    expr: "(volume_size_gb * 1024) // (nodes * procs_per_node)"

  summary_file:
    type: str
    expr: "{{ execution_dir }}/summary_{{ execution_id }}_{{ repetition }}.json"

constraints:
  - name: "block_transfer_alignment"
    rule: "block_size_mb % requests_mb == 0"
    violation_policy: "skip"

  - name: "per_node_limit"
    rule: "procs_per_node <= 36"
    violation_policy: "skip"
 


command:
  template: >
    ior -w -b {{ block_size_mb }}mb
    -t {{ requests_mb }}mb
    {% if spatiality == 'random' %} -z {% endif %}
    {% if filestrategy == 'file-per-proc' %} -F {% endif %}
    -O summaryFile={{ summary_file }} -O summaryFormat=JSON
    -o /beegfs/lgouveia/ior_8/output.ior


  # Optional: Additional metadata to attach to results
  # This appears in output as metadata.* columns
  metadata:
    operation: "write"


scripts:
  # Script name (can define multiple scripts)
  - name: "ior"

    submit: "sbatch"

    #script_template: examples/ior/scripts/ior_slurm.sh

    script_template: |
      
      #!/bin/bash
      #SBATCH --job-name=iops_{{ execution_id }}
      #SBATCH --ntasks={{ total_procs  }}
      #SBATCH --nodes={{ nodes }}
      #SBATCH --ntasks-per-node={{ procs_per_node }}
      #SBATCH --time=00:01:00
      #SBATCH --chdir={{ execution_dir }}
      #SBATCH -o batch%j.out
      #SBATCH -e batch%j.err
      #SBATCH --exclusive
      #SBATCH --constraint bora
     

      {% if with_toto %}
      # add toto env vars for the test
      export TOTO_PFS_PATHS=/beegfs
      #export TOTO_ACCUMULATE_STATISTICS=1
      export TOTO_LOG_LEVEL='ERROR'
      #export TOTO_STRIPE_COUNT_TUNING=0
      #export TOTO_MONITOR_OST_PERFORMANCE=0
      export TOTO_LOG_TO_STDOUT=0
      export TOTO_BEEGFS_STRIPING_PREFIX=/beegfs/lgouveia
      export TOTO_BEEGFS_STRIPING_SUFIX=ior
      export TOTO_LOGS_FOLDER={{ execution_dir }} 
      export TOTO_ANALYSIS_PERIOD={{ analysis_period }}
      {% endif %}

      module purge
      module load mpi/openmpi/4.0.1
      module load compiler/gcc/12.2.0
      mpirun  --mca btl ^uct --mca fs ^lustre --mca osc ^ucx --mca pml ^ucx --mca btl_openib_allow_ib 1 {% if with_toto %}  env LD_PRELOAD=/home/lgouveia/toto/toto.so {% endif %} {{ command.template }}
    
    #post:
    #  script: /home/lgouveia/workdir/post_script.sh

    parser:
      # File to parse (typically a variable pointing to the output)
      file: "{{ summary_file }}"
      # List of metrics to extract
      # Each metric name must be returned by the parser script
      metrics:
        - name: bwMiB       # Bandwidth in MiB/s
        - name: totalTime   # Total execution time

      # ---------------------------------------------------------------------------
      # PARSER SCRIPT OPTIONS:
      # ---------------------------------------------------------------------------
      # OPTION 1: EXTERNAL PARSER SCRIPT (RECOMMENDED - Active by default)
      #   Reference an external Python script with a parse(file_path) function.
      #   This makes editing and debugging easier.
      #   The wizard copied a working IOR parser to: examples/ior/scripts/ior_parser.py
      #
      #   Customize this script to parse your benchmark's output format.
      # ---------------------------------------------------------------------------
      #parser_script: ior_parser.py

      # ---------------------------------------------------------------------------
      parser_script: |
        import json
        def parse(file_path: str):
            with open(file_path, "r") as f:
                data = json.load(f)
            tests = data.get("tests", [])
            if not tests:
                raise ValueError("No tests found in IOR JSON")
            results = tests[0].get("Results", [])
            if not results:
                raise ValueError("No Results found in IOR JSON")
            write_res = next(
                (r for r in results if str(r.get("access", "")).lower() == "write"),
                results[0],
            )
            return write_res


# =============================================================================
# OUTPUT CONFIGURATION
# =============================================================================
# Define how results should be stored
# Supports schema evolution: new columns are added automatically in append mode
# =============================================================================
output:
  sink:
    # Output format: csv | parquet | sqlite
    type: csv

    # Output path (supports Jinja2 templating)
    path: "{{ workdir }}/results.csv"

    mode: append
