# GitLab CI/CD configuration for IOPS

default:
  image: "${CI_TEMPLATE_REGISTRY_HOST}/pages/hugo:latest"
  tags:
    - ci.inria.fr

stages:
  - test
  - build
  - deploy
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  GIT_SUBMODULE_STRATEGY: recursive

cache:
  paths:
    - .cache/pip

# Run tests
test:
  stage: test
  image: python:3.10
  tags:
    - ci.inria.fr
  before_script:
    - pip install -e .
    - pip install -r requirements-dev.txt
  script:
    - pytest tests/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev-1.0"
    - if: $CI_COMMIT_BRANCH == "dev-3.0"

# Build documentation with Hugo
pages:
  stage: deploy
  script:
    - hugo --minify
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Preview documentation for merge requests
pages:preview:
  stage: build
  script:
    - hugo --minify
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Publish to PyPI when a tag is created
publish-pypi:
  stage: release
  image: python:3.10
  tags:
    - ci.inria.fr
  before_script:
    - pip install build twine
  script:
    # Clean previous builds
    - rm -rf dist/ build/ *.egg-info iops.egg-info
    # Build package
    - python -m build
    # Upload to PyPI
    - python -m twine upload dist/*
  rules:
    # Only run on tags matching v*.*.* pattern
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  # Only allow manual trigger as safety measure (optional - remove to auto-publish)
  when: manual
