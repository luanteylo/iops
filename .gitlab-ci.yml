# GitLab CI/CD configuration for IOPS

default:
  image: "${CI_TEMPLATE_REGISTRY_HOST}/pages/hugo:latest"
  tags:
    - ci.inria.fr

stages:
  - test
  - build
  - deploy
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  GIT_SUBMODULE_STRATEGY: recursive

cache:
  paths:
    - .cache/pip

# Run tests
test:
  stage: test
  image: python:3.10
  tags:
    - ci.inria.fr
  before_script:
    - pip install -e ".[bayesian]"
    - pip install -r requirements-dev.txt
  script:
    - pytest tests/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev-1.0"
    - if: $CI_COMMIT_BRANCH == "dev-3.0"
    - if: $CI_COMMIT_BRANCH == "dev-3.5.x"
    - if: $CI_COMMIT_BRANCH == "main"

# Build documentation with Hugo
pages:
  stage: deploy
  variables:
    GIT_DEPTH: 0  # Full clone to access other branches
  script:
    # Build main docs
    - hugo --minify
    # Fetch and build dev docs to /dev/ subdirectory
    - git fetch origin dev-3.5
    - git worktree add dev-branch origin/dev-3.5
    - cd dev-branch
    - git submodule update --init --recursive
    - hugo --minify --baseURL "${CI_PAGES_URL}/dev/" -d ../public/dev
    - cd ..
    - rm -rf dev-branch
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Deploy to iops.gitlabpages.inria.fr
deploy-iops-domain:
  stage: deploy
  variables:
    GIT_DEPTH: 0
  script:
    # Build site with the iops.gitlabpages.inria.fr base URL
    - hugo --minify --baseURL "https://iops.gitlabpages.inria.fr/" -d iops-pages
    # Build dev docs
    - git fetch origin dev-3.5
    - git worktree add dev-branch origin/dev-3.5
    - cd dev-branch
    - git submodule update --init --recursive
    - hugo --minify --baseURL "https://iops.gitlabpages.inria.fr/dev/" -d ../iops-pages/dev
    - cd ..
    - rm -rf dev-branch
    # Push to the iops.gitlabpages.inria.fr repo
    - git clone https://oauth2:${IOPS_PAGES_TOKEN}@gitlab.inria.fr/iops/iops.gitlabpages.inria.fr.git deploy-repo
    - rm -rf deploy-repo/public
    - mv iops-pages deploy-repo/public
    - cd deploy-repo
    - git config user.email "ci@iops"
    - git config user.name "IOPS CI"
    - git add -A
    - git diff --cached --quiet || (git commit -m "Update site from IOPS main" && git push)
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Preview documentation for merge requests
pages:preview:
  stage: build
  script:
    - hugo --minify
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Publish to PyPI when a tag is created
publish-pypi:
  stage: release
  image: python:3.10
  tags:
    - ci.inria.fr
  before_script:
    - pip install build twine
    # Verify PyPI credentials are configured
    - |
      if [ -z "$TWINE_USERNAME" ] || [ -z "$TWINE_PASSWORD" ]; then
        echo "ERROR: TWINE_USERNAME and TWINE_PASSWORD must be set in GitLab CI/CD variables"
        exit 1
      fi
    - echo "PyPI credentials found (username=${TWINE_USERNAME})"
  script:
    # Clean previous builds
    - rm -rf dist/ build/ *.egg-info iops.egg-info
    # Build package
    - python -m build
    # Upload to PyPI using username/password authentication
    - python -m twine upload --non-interactive --verbose dist/*
  rules:
    # Only run on tags matching v*.*.* pattern
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  # Only allow manual trigger as safety measure (optional - remove to auto-publish)
  when: manual
