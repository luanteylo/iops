site_name: IOPS - I/O Performance Suite
site_description: A generic benchmark orchestration framework for automated parametric experiments
site_author: TADAAM - INRIA Bordeaux
site_url: https://lgouveia.gitlabpages.inria.fr/iops

repo_name: lgouveia/iops
repo_url: https://gitlab.inria.fr/lgouveia/iops
edit_uri: -/edit/dev-1.0/docs/

copyright: Copyright &copy; 2022-2025 INRIA - TADAAM Team

theme:
  name: material
  language: en
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/gitlab
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view

# Navigation structure
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Basic Concepts: getting-started/concepts.md
  - User Guide:
    - Configuration: user-guide/configuration.md
    - YAML Format: user-guide/yaml-format.md
    - Search Methods: user-guide/search-methods.md
    - Execution Backends: user-guide/execution-backends.md
    - Result Caching: user-guide/caching.md
    - Analysis & Reports: user-guide/analysis.md
  - Examples:
    - Overview: examples/index.md
    - Simple Local Example: examples/simple.md
    - Bayesian Optimization: examples/bayesian.md
    - SLURM Cluster: examples/slurm.md
  - Reference:
    - Command Line Interface: reference/cli.md
    - YAML Schema: reference/yaml-schema.md
  - About:
    - Changelog: about/changelog.md
    - License: about/license.md
    - Contributing: about/contributing.md

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - autorefs

# Extra configuration
extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.inria.fr/lgouveia/iops
      name: GitLab Repository
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/iops-benchmark/
      name: PyPI Package

extra_css:
  - stylesheets/extra.css
