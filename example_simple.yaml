benchmark:
  name: "IOR Benchmark"
  description: "A benchmark to measure I/O performance using the IOR tool."
  workdir: "/home/luan/workdir/"
  sqlite_db: "/home/luan/iops.db"
  repetitions: 3 # global repetitions for each test case. It is ignored when rounds has its own value
  search_method: "exhaustive" # used to define the policy for test execution selection
  executor : "slurm" # specify the executor to use : local | slurm 


vars:
  # Swept variables (global definition)
  nodes:
    type: int
    sweep:
      mode: range           # range | list
      start: 1
      end: 4
      step: 1
  processes_per_node:
    type: int
    sweep:
      mode: list
      values: [8]

  volume_size_gb:
    type: int
    sweep:
      mode: list
      values: [8]

  block_size_mb:
    type: int
    expr: "(volume_size_gb * 1024) / (nodes * processes_per_node)"
  
  summary_file:
    type: str
    expr: "{{ workdir }}/summary_{{ execution_id }}_{{ repetition }}.json"


command:
  template: >    
    ior -w -b {{ block_size_mb }}mb -t 1m
    -O summaryFile={{summary_file}} -O summaryFormat=JSON
    -o /beegfs/output.ior

  metadata:
    operation: "write"
    io_engine: "MPI-IO"
    access_pattern: "contiguous"
    volume_size_gb: "{{ volume_size_gb }}"
    block_size_mb: "{{ block_size_mb }}"
    total_data_size: "{{ volume_size_gb }}"

scripts:
  - name: "slurm_mpi" 
    submit: "sbatch"
    script_template: |
      #!/bin/bash
      #SBATCH --job-name=ior_benchmark_{{ repetition }}_{{ round_name }}
      #SBATCH --output=ior_benchmark_%j.out
      #SBATCH --error=ior_benchmark_%j.err
      #SBATCH --nodes={{ nodes }}
      #SBATCH --ntasks-per-node={{ processes_per_node }}
      #SBATCH --time=01:00:00
      #SBATCH --account=default

      module load mpi
      module load ior

      mpirun --mca btl ^uct --mca fs ^lustre --mca osc ^ucx --mca pml ^ucx --mca btl_openib_allow_ib 1 {{ command.template }}      
     
      echo "repetition {{ repetition }} completed."

    post:
      script: |
        #!/bin/bash
        echo "Job completed. Summary file located at {{ summary_file }}"

    parser:
      type: "json"
      file: "{{ summary_file }}"
      metrics:
        - name: "write_bandwidth"
          path: "results[0].bw_MiB"
      parser_script: |
        import json, sys
        with open(sys.argv[1], "r") as f:
            data = json.load(f)
        print(data["results"][0]["bw_MiB"])

output:
  csv:
    path: "{{ workdir }}/results.csv"
    include:
      - "benchmark.name"
      - "nodes"
      - "processes_per_node"
      - "block_size_mb"
      - "ost_path"
      - "total_data_size"
      - "write_bandwidth"

rounds:
  # Round 1: sweep only `nodes`, keep others fixed.
  - name: "nodes_sweep"
    description: "Find best nodes by write bandwidth."
    sweep_vars: ["nodes", "processes_per_node"]           # which vars from `vars` are swept in this round
    fixed_overrides:                # optional: override defaults for some vars
      block_size_mb: 16
      processes_per_node: 16
    repetitions: 3       
    search:
      metric: "write_bandwidth"     # name in parser metrics
      objective: "max"              # max | min
    propagate:
      vars: ["nodes"]               # export best `nodes` to become default for next rounds
  # Round 2: sweep `volume_size_gb` to find optimal size with best nodes from Round 1.
  - name: "volume_size_sweep"
    description: "Find best volume size by write bandwidth."
    sweep_vars: ["volume_size_gb"]
    repetitions: 3
    search:
      metric: "write_bandwidth"
      objective: "max"
    


