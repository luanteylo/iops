baseURL = 'https://lgouveia.gitlabpages.inria.fr/iops/'
languageCode = 'en-us'
title = 'IOPS - I/O Performance Suite'
theme = 'hugo-theme-relearn'

# Enable Git info
enableGitInfo = true

[params]
  description = "A generic benchmark orchestration framework for automated parametric experiments"
  author = "INRIA - TADAAM Team"

  # Relearn theme specific
  editURL = "https://gitlab.inria.fr/lgouveia/iops/-/edit/dev-1.0/"
  showVisitedLinks = true
  disableSearch = false
  disableNextPrev = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML"]
