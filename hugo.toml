baseURL = 'https://lgouveia.gitlabpages.inria.fr/iops/'
languageCode = 'en-us'
title = 'IOPS - I/O Performance Suite'
theme = 'hugo-geekdoc'

# Enable Git info
enableGitInfo = true

[params]
  # GeekDoc specific parameters
  geekdocRepo = "https://gitlab.inria.fr/lgouveia/iops"
  geekdocEditPath = "-/edit/dev-1.0"
  geekdocSearch = true
  geekdocDarkMode = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = "monokai"
    tabWidth = 4

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML"]
